- name: ntfy
  hosts: marek246.tailnet-ba52.ts.net
  gather_facts: true
  vars_files:
    - "../inventories/prod/secret_vars/all.yaml"
    - "../inventories/prod/secret_vars/services/ntfy.yaml"
  vars:
    ntfy_restore_backup: true
    ntfy_restore_snapshot: "latest:/data/ntfy.sh"
    ntfy_restore_target: "/data/ntfy"
    ntfy_restore_mount_source: "{{ ntfy_dir }}"
    ntfy_restic_env_file: "{{ restic_env_vars_file_dir }}/restic.env"
    ntfy_restic_image: "docker.io/restic/restic:0.18.1"
    restic_env_vars_file_dir: "/etc/restic"
  
  pre_tasks:
    - name: Gather per-host secret files
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop:
        - "../inventories/prod/secret_vars/{{ inventory_hostname }}/base.yaml"
        - "../inventories/prod/secret_vars/{{ inventory_hostname }}/restic.yaml"
      when: lookup('ansible.builtin.fileglob', item) | length > 0
  
  tasks:
    - name: ntfy | variables (detect container)
      ansible.builtin.set_fact:
        run_as_root: "{{ ansible_facts['virtualization_tech_guest'] | default([]) | intersect(['lxc', 'container']) | length > 0 }}"
    
    - name: ntfy | variables (compute once, reuse everywhere)
      ansible.builtin.set_fact:
        service_dir: "{{ '/etc/systemd/system' if run_as_root else '/home/' ~ main_user ~ '/.config/systemd/user' }}"
        quadlet_dir: "{{ '/etc/containers/systemd' if run_as_root else '/home/' ~ main_user ~ '/.config/containers/systemd' }}"
        file_owner: "{{ 'root' if run_as_root else main_user }}"
        file_group: "{{ 'root' if run_as_root else main_user }}"
        calculated_become: "{{ run_as_root }}"
        systemd_scope: "{{ 'system' if run_as_root else 'user' }}"
        ntfy_config_path: "{{ ntfy_dir }}/server.yml"
        ntfy_directories:
          - "{{ ntfy_dir }}"
          - "{{ ntfy_dir }}/lib"
          - "{{ ntfy_dir }}/cache"
        ntfy_restore_snapshot: "{{ ntfy_restore_snapshot }}"
        ntfy_restore_target: "{{ ntfy_restore_target }}"
        ntfy_restore_mount_source: "{{ ntfy_restore_mount_source }}"
        ntfy_restic_env_file: "{{ ntfy_restic_env_file }}"
        ntfy_restic_image: "{{ ntfy_restic_image }}"
        restic_env_vars_file_dir: "{{ restic_env_vars_file_dir }}"
    
    - name: ntfy | Info
      ansible.builtin.debug:
        msg:
          - "Run as root: {{ run_as_root }}"
          - "Service dir: {{ service_dir }}"
          - "Quadlet dir: {{ quadlet_dir }}"
          - "User: {{ file_owner }}"
          - "Group: {{ file_group }}"
          - "Become: {{ calculated_become }}"
          - "Scope: {{ systemd_scope }}"
          - "ntfy_dir: {{ ntfy_dir }}"
          - "ntfy_restore_snapshot: {{ ntfy_restore_snapshot }}"
          - "ntfy_restore_target: {{ ntfy_restore_target }}"
          - "ntfy_restore_mount_source: {{ ntfy_restore_mount_source }}"
          - "ntfy_restic_env_file: {{ ntfy_restic_env_file }}"
          - "ntfy_restic_image: {{ ntfy_restic_image }}"
          - "restic_env_vars_file_dir: {{ restic_env_vars_file_dir }}"
    
    - name: ntfy | Systemd Podman Quadlet
      ansible.builtin.template:
        src: "../files/ntfy/ntfy.container"
        dest: "{{ quadlet_dir }}/ntfy.container"
        comment_start_string: "# BEGIN_OF_COMMENT"
        comment_end_string: "# END_OF_COMMENT"
        owner: "{{ file_owner }}"
        group: "{{ file_group }}"
        mode: "0640"
      become: "{{ calculated_become }}"
      register: systemd_podman_quadlet_output
      notify: Restart service
    
    - name: ntfy | Ensure data directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ file_owner }}"
        group: "{{ file_group }}"
        mode: "0750"
      loop: "{{ ntfy_directories }}"
      become: "{{ calculated_become }}"
      register: ntfy_directories_output
      notify: Restart service

    - name: ntfy | Restore ntfy data from restic backup
      ansible.builtin.command:
        argv:
          - "podman"
          - "run"
          - "--rm"
          - "--network=host"
          - "--volume={{ ntfy_dir }}:/data/ntfy:z"
          - "--env-file={{ ntfy_restic_env_file }}"
          - "-env=RESTIC_REPOSITORY=s3:http://127.0.0.1:53901/backup/restic/wyse01"
          - "{{ ntfy_restic_image }}"
          - "restore"
          - "{{ ntfy_restore_snapshot }}"
          - "--target={{ ntfy_restore_target }}"
          - "--exclude-xattr"
          - "security.selinux"
      become: "{{ calculated_become }}"
      when: ntfy_restore_backup
      notify: Restart service
    
    - name: ntfy | copy server configuration
      ansible.builtin.template:
        src: "../files/ntfy/server.yml"
        dest: "{{ ntfy_config_path }}"
        owner: "{{ file_owner }}"
        group: "{{ file_group }}"
        mode: "0640"
      become: "{{ calculated_become }}"
      register: ntfy_config_output
      notify: Restart service
  
  handlers:
    - name: Restart service
      ansible.builtin.systemd:
        daemon_reload: true
        name: ntfy.service
        state: restarted
        enabled: true
        scope: "{{ systemd_scope }}"
      become: "{{ calculated_become }}"
