- name: packages
  hosts: coreos:dnf:desktop
  gather_facts: true
  
  pre_tasks:
    - name: Gather per-host secret files
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop:
        - "../inventories/prod/secret_vars/{{ inventory_hostname }}/base.yaml"
      when: lookup('ansible.builtin.fileglob', item) | length > 0

  tasks:

    - name: packages | update sudoers secure_path to include /usr/local/bin
      become: true
      ansible.builtin.copy:
        dest: /etc/sudoers.d/secure_path
        content: "Defaults    secure_path = /sbin:/bin:/usr/sbin:/usr/bin:/usr/local/bin\n"
        validate: 'visudo -cf %s'
        owner: root
        group: root
        mode: '0440'
      when:
        - ansible_facts["pkg_mgr"] in ['dnf', 'dnf5']
        - (ansible_facts["distribution_major_version"] | int) in [9, 10]
    
    - name: epel-release | dnf
      become: true
      ansible.builtin.dnf:
        name:
          - epel-release
        state: present
      when:
        - ansible_facts["pkg_mgr"] in ['dnf', 'dnf5']
        - (ansible_facts["distribution_major_version"] | int) in [9, 10]
      register: install_epel_release
      failed_when: install_epel_release.rc >= 2
      
    - name: packages | dnf install
      become: true
      ansible.builtin.dnf:
        name:
          - age
          - bat
          - below
          - binutils
          - fd-find
          - fuse3
          - git
          - iftop
          - jq
          - mkpasswd
          - ncdu
          - nano
          - rsync
          - smartmontools
          - sequoia-sq
          - sysbench
          - sysstat
          - unzip
          - upower
          - podman
          - nodejs
          - wget
          - zip
        state: present
      when:
        - ansible_facts["pkg_mgr"] in ['dnf', 'dnf5']
        - (ansible_facts["distribution_major_version"] | int) in [9, 10]
    
    - name: packages | dra
      ansible.builtin.shell: |
        set -euo pipefail
        
        if ! command -v dra >/dev/null 2>&1; then
          echo "not found; installing..."
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/devmatteini/dra/d3649805056fe4bf39365bcb19c2590a41d5a63b/install.sh | \
            bash -s -- --to "/usr/local/bin"
        else
          echo "already in path"
        fi
      args:
        executable: /usr/bin/bash
      register: dra
      failed_when: dra.rc != 0
      changed_when: "'installing...' in dra.stdout"
      become: true
    
    - name: packages | ensure-cmd
      ansible.builtin.copy:
        src: "../files/ensure-cmd"
        dest: "/usr/local/bin"
        owner: "root"
        group: "root"
        mode: '0755'
      become: true
    
    - name: packages | dysk
      ansible.builtin.shell: |
        set -euo pipefail
        
        ensure-cmd \
          --cmd dysk \
          --select-archive dysk_3.6.1.zip \
          --repo-url https://github.com/Canop/dysk \
          --dir /home/{{ main_user }}/.local/bin
      args:
        executable: /usr/bin/bash
      register: dysk
      failed_when: dysk.rc != 0
      changed_when: "'installing...' in dysk.stdout"
